name: Clean M3U Playlist
on:
  schedule:
    - cron: '20 */2 * * *'
  push:
    paths:
      - 'output.m3u'
  workflow_dispatch:
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --release
      - name: Run cleaner
        run: cargo run --release
      - name: Commit and push
        run: |
          git config user.name "CXT Cleaner Bot"
          git config user.email "cxt-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain output_clean.m3u)" ]]; then
            git add output_clean.m3u
            git commit -m "Auto-clean output.m3u [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
